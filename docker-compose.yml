services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aimm
      POSTGRES_USER: aimm
      POSTGRES_PASSWORD: aimm
    ports:
      - "5432:5432"
    volumes:
      - aimm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimm -d aimm"]
      interval: 5s
      timeout: 3s
      retries: 10

  futu-opend:
    profiles: ["with-futu"]
    image: ${FUTU_OPEND_IMAGE:-registry.cn-hangzhou.aliyuncs.com/futu-openapi/opend:latest}
    restart: unless-stopped
    ports:
      - "${FUTU_OPEND_QUOTE_PORT:-11111}:11111"
      - "${FUTU_OPEND_TRADE_PORT:-11112}:11112"

volumes:
  aimm_pgdata:
