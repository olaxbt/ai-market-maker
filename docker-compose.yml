services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aimm
      POSTGRES_USER: aimm
      POSTGRES_PASSWORD: aimm
    ports:
      - "5432:5432"
    volumes:
      - aimm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimm -d aimm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aimm_pgdata:

