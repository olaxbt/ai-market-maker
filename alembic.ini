[alembic]
script_location = alembic
# NOTE: The real DB URL is injected from env in `alembic/env.py` (DATABASE_URL).
# This value only needs to be syntactically valid so Alembic's config parser doesn't fail.
sqlalchemy.url = sqlite://

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

